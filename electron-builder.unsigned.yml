extends: electron-builder.yml

win:
  forceCodeSigning: false
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]

mac:
  identity: null
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
