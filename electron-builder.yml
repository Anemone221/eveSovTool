appId: com.evesov.tool
productName: Sov Fitting Tool
copyright: Copyright © 2024 Sov Fitting Tool (SFT) Contributors

directories:
    buildResources: build
    output: dist

files:
    - out/**/*
    - resources/seed.db
    - package.json

# seed.db must be accessible at process.resourcesPath, not inside the asar
asarUnpack:
    - resources/seed.db

extraResources:
    - from: resources/seed.db
      to: seed.db
    - from: app.ico
      to: app.ico

win:
    target:
        - target: nsis
          arch: [x64]
        - target: zip
          arch: [x64]
    icon: app.ico

nsis:
    oneClick: false
    allowToChangeInstallationDirectory: true
    installerIcon: app.ico
    uninstallerIcon: app.ico
    createDesktopShortcut: true
    createStartMenuShortcut: true
    shortcutName: Sov Fitting Tool

publish: null
